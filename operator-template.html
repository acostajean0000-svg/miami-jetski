function getSlug() {
  // Support ?slug= for local file testing (file:// protocol)
  const params = new URLSearchParams(window.location.search);
  if (params.get('slug')) return params.get('slug');
  const parts = window.location.pathname.split('/').filter(Boolean);
  // Remove .html extension if present
  const last = (parts[parts.length - 1] || '').replace(/\.html$/, '');
  return last;
}

function setMeta(name, content) {
  let el = document.querySelector(`meta[name="${name}"]`);
  if (!el) { el = document.createElement('meta'); el.name = name; document.head.appendChild(el); }
  el.content = content;
}
function setOG(prop, content) {
  let el = document.querySelector(`meta[property="${prop}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute('property', prop); document.head.appendChild(el); }
  el.content = content;
}
function setLD(schema) {
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(schema);
  document.head.appendChild(s);
}
function setCanonical(url) {
  let el = document.querySelector('link[rel="canonical"]');
  if (!el) { el = document.createElement('link'); el.rel = 'canonical'; document.head.appendChild(el); }
  el.href = url;
}

function render404() {

}

function renderPage(op) {
  const catLabel  = CAT_LABELS[op.cat]  || op.cat;
  const zoneLabel = ZONE_LABELS[op.zone] || op.zl || op.zone;
  const catPage   = CAT_PAGE[op.cat]   || '/';

  const slug      = SLUG_MAP[op.id]    || '';
  const url       = `https://miamijetskiboatrentals.com/operators/${slug}`;

  // --- SEO ---
  document.title = `${op.name} | ${catLabel} in ${zoneLabel} | Florida Water Sports`;
  setMeta('description', `Book ${op.name} — ${catLabel} in ${zoneLabel}, Florida. Starting at $${op.price}/hr. ${op.addr}.`);
  setCanonical(url);
  setOG('og:title',       `${op.name} | ${catLabel} in ${zoneLabel}`);
  setOG('og:description', `Book ${op.name} in ${zoneLabel}. From $${op.price}/hr.`);
  setOG('og:url',         url);
  setOG('og:image',       'https://miamijetskiboatrentals.com/og-image.png');

  setMeta('twitter:image', 'https://miamijetskiboatrentals.com/og-image.png');

  setLD({
    "@context":"https://schema.org","@type":"LocalBusiness",
    "name": op.name,
    "description": `${catLabel} in ${zoneLabel}, Florida. Book online starting at $${op.price} per hour.`,
    "address":{"@type":"PostalAddress","streetAddress":op.addr,"addressRegion":"FL","addressCountry":"US"},
    "geo":{"@type":"GeoCoordinates","latitude":op.lat,"longitude":op.lng},
    "url": url, "priceRange": `From $${op.price}`, "image": op.photo,
    "aggregateRating":{"@type":"AggregateRating","ratingValue":"4.8","reviewCount":"47","bestRating":"5"}
  });
  setLD({
    "@context":"https://schema.org","@type":"BreadcrumbList",
    "itemListElement":[
      {"@type":"ListItem","position":1,"name":"Home","item":"https://miamijetskiboatrentals.com/"},
      {"@type":"ListItem","position":2,"name":catLabel,"item":`https://miamijetskiboatrentals.com${catPage}`},
      {"@type":"ListItem","position":3,"name":op.name,"item":url}
    ]
  });

  // --- Breadcrumb ---
  document.getElementById('breadcrumb').innerHTML =
    `<a href="/">Home</a><span class="sep">›</span>
     <a href="${catPage}">${catLabel}</a><span class="sep">›</span>
     <span>${op.name}</span>`;

  // --- Related ---
  let related = ALL_OPS.filter(o => o.id !== op.id && o.cat === op.cat && o.zone === op.zone).slice(0,4);
  if (related.length < 2) related = ALL_OPS.filter(o => o.id !== op.id && o.cat === op.cat).slice(0,4);
  const relCards = related.map(r => {
    const rs  = SLUG_MAP[r.id] || '';
    const rl  = CAT_LABELS[r.cat]  || r.cat;
    const rzl = ZONE_LABELS[r.zone] || r.zl || '';
    return `<a href="/operators/${rs}" class="rel-card">
      <div class="rel-photo" style="background-image:url('${r.photo}')"></div>
      <div class="rel-info">
        <div class="rel-name">${r.name}</div>
        <div class="rel-meta">${rl} · ${rzl}</div>
        <div class="rel-price">From $${r.price}/hr</div>
      </div>
    </a>`;
  }).join('');

  const badgeHtml = op.badge ? `<span class="hero-badge">${op.badge}</span>` : '';

  // --- Main HTML ---
  document.getElementById('main').innerHTML = `
    <div class="hero-photo-wrap">
      <img class="hero-photo" src="${op.photo}" alt="${op.name}"
        onerror="this.src='https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=900&q=80'">
      ${badgeHtml}
    </div>

    <h1>${op.name}</h1>
    <div class="meta-row">
      <span class="meta-chip price-chip">From $${op.price}/hr</span>
      <span class="meta-chip">${zoneLabel}</span>
      <span class="meta-chip">${catLabel}</span>
    </div>

    <a href="${op.link}" target="_blank" rel="noopener" class="book-btn">
      🏄 Book Now — From $${op.price}/hr

    <p class="section-title">📋 Details</p>

      <div class="detail-card"><div class="detail-label">Address</div><div class="detail-value">${op.addr}</div></div>
      <div class="detail-card"><div class="detail-label">Category</div><div class="detail-value">${catLabel}</div></div>
      <div class="detail-card"><div class="detail-label">Zone</div><div class="detail-value">${zoneLabel}</div></div>
      <div class="detail-card"><div class="detail-label">Starting Price</div><div class="detail-value">$${op.price} / hour</div></div>

    <p style="margin-top:20px;text-align:center">
      <a href="${catPage}" style="color:#00d2ff;text-decoration:underline">← All ${catLabel}s in Florida</a>
    </p>
  `;
}
