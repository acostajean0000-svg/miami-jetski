const CAT_PAGE={jetski:'/jet-ski-rentals-florida.html',boat:'/boat-rentals-florida.html',slingshot:'/slingshot-rentals-florida.html',watersports:'/water-sports-florida.html',tour:'/tours-florida.html',fishing:'/fishing-charters-florida.html',jetcar:'/jet-car-rentals-florida.html',atv:'/atv-rentals-florida.html',golfcart:'/golf-cart-rentals-florida.html',aerial:'/tours-florida.html',bikerental:'/water-sports-florida.html'};

const ZONE_PAGE={miami:'/miami-water-sports.html',broward:'/fort-lauderdale-water-sports.html',keys:'/florida-keys-water-sports.html',palmbeach:'/palm-beach-water-sports.html',gulf:'/gulf-coast-water-sports.html',centralfl:'/central-florida-water-sports.html',everglades:'/everglades-tours-rentals.html',westfl:'/west-florida-water-sports.html',central:'/central-florida-water-sports.html',space:'/space-coast-water-sports.html',nefl:'/northeast-florida-water-sports.html',northeast:'/northeast-florida-water-sports.html'};

function getSlug(){
  const p=new URLSearchParams(window.location.search);
  if(p.get('slug'))return p.get('slug');
  const parts=window.location.pathname.split('/').filter(Boolean);
  return(parts[parts.length-1]||'').replace(/\.html$/,'');
}

function setMeta(n,c){let e=document.querySelector('meta[name="'+n+'"]');if(!e){e=document.createElement('meta');e.name=n;document.head.appendChild(e);}e.content=c;}
function setOG(p,c){let e=document.querySelector('meta[property="'+p+'"]');if(!e){e=document.createElement('meta');e.setAttribute('property',p);document.head.appendChild(e);}e.content=c;}
function setLD(s){const t=document.createElement('script');t.type='application/ld+json';t.textContent=JSON.stringify(s);document.head.appendChild(t);}
function setCanonical(u){let e=document.querySelector('link[rel="canonical"]');if(!e){e=document.createElement('link');e.rel='canonical';document.head.appendChild(e);}e.href=u;}

function render404(){
  document.getElementById('main').innerHTML='<div class="err"><h2>Operator not found</h2><p>This operator may have moved or been removed.</p><p style="margin-top:16px"><a href="/">← View all 312 operators</a></p></div>';
  document.getElementById('bc').innerHTML='<a href="/">Home</a><span class="sep">›</span><span>Not found</span>';
}

function renderPage(op, allOps){
  const catLabel=CAT_LABELS[op.cat]||op.cat;
  const zoneLabel=ZONE_LABELS[op.zone]||op.zl||op.zone;
  const catPage=CAT_PAGE[op.cat]||'/';
  const zonePage=ZONE_PAGE[op.zone]||'/';
  const slug=SLUG_MAP[op.id]||'';
  const url='https://miamijetskiboatrentals.com/'+slug;

  document.title=op.name+' | '+catLabel+' in '+zoneLabel+' | Florida Water Sports';
  setMeta('description','Book '+op.name+' — '+catLabel+' in '+zoneLabel+', Florida. Starting at $'+op.price+'/hr. '+op.addr+'.');
  setCanonical(url);
  setOG('og:title',op.name+' | '+catLabel+' in '+zoneLabel);
  setOG('og:description','Book '+op.name+' in '+zoneLabel+'. From $'+op.price+'/hr.');
  setOG('og:url',url);
  setOG('og:image','https://miamijetskiboatrentals.com/og-image.png');
  setMeta('twitter:card','summary_large_image');
  setMeta('twitter:image','https://miamijetskiboatrentals.com/og-image.png');

  setLD({"@context":"https://schema.org","@type":"LocalBusiness","name":op.name,"description":catLabel+" in "+zoneLabel+", Florida. Starting at $"+op.price+" per hour.","address":{"@type":"PostalAddress","streetAddress":op.addr,"addressRegion":"FL","addressCountry":"US"},"geo":{"@type":"GeoCoordinates","latitude":op.lat,"longitude":op.lng},"url":url,"priceRange":"From $"+op.price,"image":op.photo});
  setLD({"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://miamijetskiboatrentals.com/"},{"@type":"ListItem","position":2,"name":catLabel,"item":"https://miamijetskiboatrentals.com"+catPage},{"@type":"ListItem","position":3,"name":op.name,"item":url}]});

  document.getElementById('bc').innerHTML='<a href="/">Home</a><span class="sep">›</span><a href="'+catPage+'">'+catLabel+'</a><span class="sep">›</span><span>'+op.name+'</span>';

  const related=allOps.filter(o=>o.id!==op.id&&o.cat===op.cat&&o.zone===op.zone).slice(0,4);
  const rel2=related.length<2?allOps.filter(o=>o.id!==op.id&&o.cat===op.cat).slice(0,4):related;
  const relHTML=rel2.map(r=>{
    const rs=SLUG_MAP[r.id]||'';
    return '<a href="/'+rs+'" class="rc"><div class="rp" style="background-image:url(''+r.photo+'')"></div><div class="ri"><div class="rn">'+r.name+'</div><div class="rm">'+(CAT_LABELS[r.cat]||r.cat)+' · '+(ZONE_LABELS[r.zone]||r.zl||'')+'</div><div class="rpr">From $'+r.price+'/hr</div></div></a>';
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="hero-wrap">
      <img class="hero-photo" src="${op.photo}" alt="${op.name}" onerror="this.src='https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=900&q=80'">
      ${op.badge?'<span class="hero-badge">'+op.badge+'</span>':''}
    </div>
    <h1>${op.name}</h1>
    <div class="chips">
      <span class="chip price">From $${op.price}/hr</span>
      <span class="chip">${zoneLabel}</span>
      <span class="chip">${catLabel}</span>
    </div>
    <a href="${op.link}" target="_blank" rel="noopener" class="book-btn">🏄 Book Now — From $${op.price}/hr</a>
    <p class="stitle">📋 Details</p>
    <div class="dg">
      <div class="dc"><div class="dl">Address</div><div class="dv">${op.addr}</div></div>
      <div class="dc"><div class="dl">Category</div><div class="dv">${catLabel}</div></div>
      <div class="dc"><div class="dl">Zone</div><div class="dv">${zoneLabel}</div></div>
      <div class="dc"><div class="dl">Starting Price</div><div class="dv">$${op.price} / hour</div></div>
    </div>
    <p class="stitle">📍 Location</p>
    <div class="map-wrap">
      <iframe src="https://maps.google.com/maps?q=${op.lat},${op.lng}&z=15&output=embed" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    ${rel2.length?'<p class="stitle">🌊 Similar '+catLabel+'s Nearby</p><div class="rg">'+relHTML+'</div>':''}
    <p style="margin-top:20px;text-align:center"><a href="${catPage}" style="color:#00d2ff;text-decoration:underline">← All ${catLabel}s in Florida</a></p>
  `;
}

(function(){
  const slug=getSlug();
  const opId=REV_SLUG[slug];
  if(!opId){render404();return;}
  fetch('/operators.json')
    .then(r=>r.json())
    .then(ops=>{
      const op=ops.find(o=>o.id===opId);
      if(op)renderPage(op,ops);
      else render404();
    })
    .catch(()=>render404());
})();
</script>
